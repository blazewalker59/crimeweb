# Cloudflare Workers configuration for CrimeWeb
name = "crimeweb"
main = "@tanstack/react-start/server-entry"
compatibility_date = "2025-01-04"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"

# Secrets are set via: wrangler secret put TMDB_API_KEY
# - TMDB_API_KEY
# - TMDB_API_READ_ACCESS_TOKEN

[dev]
port = 8788
